  <script type="text/javascript">
    window.onload = function urlborder() {
      var div = document.getElementById("div");
      if(div) {
        var listr = div.getElementsByTagName('dl');
        for (var i = 0; i < listr.length; i++) {
          if (i == listr.length - 1) {
            listr[i].style.borderWidth = "0";
          }
        }
      }
    }
  </script>
  <script type="text/javascript">
    var bullets = document.getElementById('scroll_position').getElementsByTagName('a');
    var scrollImg = document.getElementById('scroll_img');
    if (scrollImg && typeof Swipe === 'function') {
      var slider = Swipe(scrollImg, {
        auto: 3000,
        continuous: true,
        callback: function (pos) {
          var i = bullets.length;
          while (i--) {
            bullets[i].className = ' ';
          }
          if(bullets[pos]) bullets[pos].className = 'on';
        }
      });
    }

    $(function () {
      if(bullets[0]) bullets[0].className = 'on';
      $('.scroll_position_bg').css({
        width: $('#scroll_position').width()
      });
    });

<script>
  $(document).ready(function() {
    // 1. 从 URL 中解析 code 参数
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');

    if (code) {
      // 2. 发送请求给 Node.js 后端接口
      $.ajax({
        url: '/api/verify?code=' + code,
        type: 'GET',
        success: function(data) {
          // 确保解析为 JSON 对象
          var json = typeof data === 'string' ? JSON.parse(data) : data;

          // 3. 执行你的显示逻辑
          if (json.State == "1") {
            // 首次查询
            $("#result").html("Real");
            $("#times").html("One");
            $("#time_identification").html("");
            $("#location_identification").html("");
          } else if (json.State == "0") {
            // 多次查询
            $("#result").html("Real");
            $("#times").html(json.Times + "s");
            $("#time_identification").html(json.FirstDate);
            $("#location_identification").html(json.RecordList[0].Address);
          } else {
            // 验证码不存在或异常 (-1 或其他)
            $("#result").html("Fake").css("color", "red");
            $("#times").html("Invalid");
            $("#time_identification").html("-");
            $("#location_identification").html("-");
          }
        },
        error: function() {
          $("#result").html("Network Error").css("color", "red");
        }
      });
    } else {
      // 未检测到 Code 参数
      $("#result").html("No Code").css("color", "red");
      $("#times").html("-");
    }
  });
</script>
